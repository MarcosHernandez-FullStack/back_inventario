name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - master

env:
  REGISTRY:      inventarioregistry.azurecr.io
  IMAGE_NAME:    back-inventario
  RESOURCE_GROUP: rg-inventario
  CONTAINER_APP:  back-inventario-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Iniciar sesión en Azure Container Registry
        run: |
          az acr login --name inventarioregistry

      - name: Construir y subir imagen Docker
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Actualizar Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
